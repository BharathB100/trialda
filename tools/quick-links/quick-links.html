<!DOCTYPE html>
<html>
  <head>
    <title>Quick Links Plugin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="icon" href="data:,">
    <script src="https://da.live/nx/utils/sdk.js" type="module"></script>
    <script src="/tools/quick-links/quick-links.js" type="module"></script>
    <link rel="stylesheet" href="https://use.typekit.net/hah7vzn.css">
    <style>
      body {
        font-family: 'Adobe Clean', 'adobe-clean', sans-serif;
        padding: 16px;
        margin: 0;
      }
      h3 {
        margin: 0 0 12px 0;
        font-size: 14px;
        color: #666;
      }
      .link-group {
        margin-bottom: 20px;
      }
      .link-btn {
        display: block;
        width: 100%;
        padding: 10px 12px;
        margin-bottom: 8px;
        font-family: inherit;
        font-size: 14px;
        text-align: left;
        background: #f5f5f5;
        border: 1px solid #ddd;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .link-btn:hover {
        background: #e8e8e8;
      }
      .link-btn .label {
        font-weight: bold;
        display: block;
      }
      .link-btn .url {
        font-size: 12px;
        color: #666;
        display: block;
        margin-top: 4px;
      }
      .custom-section {
        border-top: 1px solid #ddd;
        padding-top: 16px;
        margin-top: 16px;
      }
      input, select {
        width: 100%;
        padding: 8px;
        margin-bottom: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-family: inherit;
        box-sizing: border-box;
      }
      .insert-btn {
        background: #0265dc;
        color: white;
        border: none;
        padding: 10px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
        width: 100%;
      }
      .insert-btn:hover {
        background: #0254b8;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <p>Loading...</p>
    </div>
  </body>
</html>
